services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
    environment:
      - GO_ENV=development
    # 映射外部端口仅用于直接访问，反向代理通过 nginx 处理
    # ports:
    #   - "8080:8080"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    networks:
      - app-network
    # 如果你在本地开发，可以用 volumes 映射 dist，但由于使用了 multi-stage build，这里主要靠 nginx 代理
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 将编译后的前端文件传递给 nginx
      - frontend/dist:/usr/share/nginx/html:ro
    networks:
      - app-network
    depends_on:
      - backend
      - frontend

networks:
  app-network:
    driver: bridge

volumes:
  frontend-dist:
